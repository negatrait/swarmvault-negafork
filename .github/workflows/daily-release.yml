name: Daily Release

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - staging

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Go binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/swarmvault-native-linux-amd64 ./cmd/swarmvault-native
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/swarmvault-native-linux-arm64 ./cmd/swarmvault-native

      - name: Create Daily Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily
          name: Daily Release
          prerelease: true
          files: |
            dist/swarmvault-native-linux-amd64
            dist/swarmvault-native-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
