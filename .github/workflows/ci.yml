name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
      - run: |
          mkdir -p bin
          go build -o bin/swarmvault-native ./cmd/swarmvault-native
      - run: pnpm test
      - run: USE_GO_PORT=true pnpm test

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, go
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  perf-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm check:perf

  packaged-smoke:
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:preflight -- --skip-check --skip-test --skip-web --skip-skill --no-browser --no-oss-corpus

      - name: Upload packaged smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: packaged-smoke-artifacts
          path: |
            .live-smoke-artifacts/
            .oss-corpus-artifacts/
          if-no-files-found: ignore
